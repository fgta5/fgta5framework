services:
  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: minio
    restart: no #unless-stopped
    hostname: minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: rahasia123#
    volumes:
      - ../.data/minio:/data
    ports:
      - 9000:9000 #api 
      - 9001:9001 #web UI
    networks:
      - docker1

networks:
  docker1:
    name: docker1
    external: true
